# Railway Configuration
[build]
  builder = "nixpacks"

[deploy]
  healthcheckPath = "/health"
  healthcheckTimeout = 300
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 10

[env]
  NODE_ENV = { default = "production" }
  PORT = { default = "3001" }

[[services]]
name = "agentkeys-api"
source = "api"

[services.healthcheckPath]
path = "/health"